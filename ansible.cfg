# ansible.cfg
[defaults]
# Use /tmp as the temp directory — safe for WSL and containerized environments
remote_tmp = /tmp

# Disable SSH host key checking for lab environment (not recommended in production)
host_key_checking = False

# Disable automatic fact gathering — speeds up playbook execution
# NOTE: If you ever need ansible_os_family or ansible_distribution
# in a playbook, you must enable facts selectively with gather_facts: true
gather_facts = False

[connection]
# Pipelining reduces SSH round-trips by batching module transfers
# Significantly speeds up Ansible over kubectl connection plugin
pipelining = True
