# docker/worker-proxy/nginx.conf
#
# NOTE: This file exists in TWO places in the project:
#   1. docker/worker-proxy/nginx.conf  — this file (reference + local testing)
#   2. k8s/worker-proxy.yaml           — embedded as a Kubernetes ConfigMap
#
# The ConfigMap version is the one actually used inside the running cluster.
# The ConfigMap is mounted into the Nginx container at:
#   /etc/nginx/conf.d/default.conf
#
# IMPORTANT: If you modify this file, you MUST also update
# the ConfigMap in k8s/worker-proxy.yaml to keep them in sync.

# Define the upstream backend — points to the worker-app Kubernetes Service
# Kubernetes DNS resolves 'worker-app' to the Service ClusterIP automatically
upstream app_backend {
    server worker-app:5000;
}

server {
    listen 80;

    # Forward all /api/ requests to the Flask application
    location /api/ {
        proxy_pass http://app_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy health check — returns 200 if Nginx itself is running
    # Used by monitor.py and manual curl checks
    location /health {
        return 200 'proxy-ok';
        add_header Content-Type text/plain;
    }
}
