# Define the backend upstream (pointing to our worker-app service)
upstream app_backend {
    server worker-app:5000;
}

server {
    listen 80;

    # Route /api/ traffic to the Python app
    location /api/ {
        proxy_pass http://app_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check for the proxy itself
    location /health {
        return 200 'proxy-ok';
        add_header Content-Type text/plain;
    }
}