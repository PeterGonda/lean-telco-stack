# k8s/worker-db.yaml
# Deployment for Worker-DB node (AlmaLinux 9)
# The container runs 'sleep infinity' as a placeholder —
# MariaDB is installed and configured by Ansible after startup
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-db
spec:
  replicas: 1
  selector:
    matchLabels:
      role: database
  template:
    metadata:
      labels:
        role: database
    spec:
      containers:
      - name: db
        image: almalinux:9
        # Keeps the container alive so Ansible can configure it
        command: ["/bin/bash", "-c", "sleep infinity"]
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
