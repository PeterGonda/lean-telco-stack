# k8s/worker-app.yaml
# Deployment + Service for Worker-App (Python Flask on Debian 12)
#
# IMPORTANT: Before applying this, import the local image into k3d:
#   docker build -t worker-app:latest ./docker/worker-app/
#   k3d image import worker-app:latest -c telco-lab
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-app
spec:
  replicas: 1
  selector:
    matchLabels:
      role: app
  template:
    metadata:
      labels:
        role: app
    spec:
      containers:
      - name: app
        image: worker-app:latest
        # Never pull from registry — use the locally imported image
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
---
# Internal Service — allows worker-proxy (Nginx) to reach
# the Flask app by DNS name 'worker-app' inside the cluster
apiVersion: v1
kind: Service
metadata:
  name: worker-app
spec:
  selector:
    role: app
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
