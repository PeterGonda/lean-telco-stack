# ansible/inventory.ini

# ---------------------------------------------------------------
# k3d Pods — connected via kubectl exec (NO SSH required)
# k3d containers do not run an SSH server by default
# The ansible_connection=kubectl plugin uses the Kubernetes API
# ---------------------------------------------------------------

[control_plane]
control-plane ansible_connection=kubectl \
  ansible_kubectl_pod="label:component=control-plane"

[worker_db]
# Dynamic lookup: finds the current Pod name by its label at runtime
worker-db ansible_connection=kubectl \
  ansible_kubectl_pod="{{ lookup('pipe', 'kubectl get pod -l role=database \
  -o jsonpath=\"{.items[0].metadata.name}\"') }}"

[worker_app]
worker-app ansible_connection=kubectl \
  ansible_kubectl_pod="label:role=app"

[worker_proxy]
worker-proxy ansible_connection=kubectl \
  ansible_kubectl_pod="label:role=proxy"

# ---------------------------------------------------------------
# Legacy Node — standalone Docker container, accessible via SSH
# Alpine has SSH installed manually, unlike the k3d pods
# ---------------------------------------------------------------
[legacy]
legacy-node ansible_host=10.10.0.6 \
  ansible_user=root \
  ansible_connection=ssh

# Global variables applied to all hosts
[all:vars]
ansible_python_interpreter=/usr/bin/python3
