# ansible/inventory.ini
# Defines all nodes and their connection method
#
# k3d Pods    -> ansible_connection=kubectl (no SSH needed inside containers)
# Legacy-Node -> ansible_connection=ssh     (Alpine with SSH installed by k3d-cluster.sh)
#
# NOTE: control_plane group removed — no playbook targets it directly
# and the kubectl pod label lookup for k3s server nodes is unreliable.
#
# IMPORTANT: All kubectl entries must be on a SINGLE LINE
# INI format does not support line continuation with backslash

# ---------------------------------------------------------------
# Worker nodes — connected via kubectl exec through Kubernetes API
# Dynamic lookup finds the actual Pod name by its label at runtime
# This is necessary because Kubernetes appends a random suffix to Pod names
# e.g. worker-db-7f4k9-x2p instead of just worker-db
# ---------------------------------------------------------------
[worker_db]
worker-db ansible_connection=kubectl ansible_kubectl_pod="{{ lookup('pipe', 'kubectl get pod -l role=database -o jsonpath=\"{.items[0].metadata.name}\"') }}"

[worker_app]
worker-app ansible_connection=kubectl ansible_kubectl_pod="{{ lookup('pipe', 'kubectl get pod -l role=app -o jsonpath=\"{.items[0].metadata.name}\"') }}"

[worker_proxy]
worker-proxy ansible_connection=kubectl ansible_kubectl_pod="{{ lookup('pipe', 'kubectl get pod -l role=proxy -o jsonpath=\"{.items[0].metadata.name}\"') }}"

# ---------------------------------------------------------------
# Legacy Node — standalone Docker container running outside k3d
# Uses standard SSH — root access configured in k3d-cluster.sh
# Password is intentionally simple for lab use only
# In production: replace with SSH key-based authentication
# ---------------------------------------------------------------
[legacy]
legacy-node ansible_host=10.10.0.6 ansible_user=root ansible_connection=ssh ansible_ssh_pass=telco123

# ---------------------------------------------------------------
# Global variables applied to all hosts
# ---------------------------------------------------------------
[all:vars]
ansible_python_interpreter=/usr/bin/python3
