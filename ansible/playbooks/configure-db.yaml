# ansible/playbooks/configure-db.yaml
- hosts: worker_db
  gather_facts: false

  tasks:
    - name: Install MariaDB server using DNF
      dnf:
        name: mariadb-server
        state: present
        use_backend: dnf

    - name: Initialize MariaDB system tables (Container fix)
      command: mysql_install_db --user=mysql --datadir=/var/lib/mysql
      args:
        # This tells Ansible to skip this step if the database is already initialized
        creates: /var/lib/mysql/mysql

    - name: Ensure correct permissions for the mysql user
      file:
        path: /var/lib/mysql
        owner: mysql
        group: mysql
        recurse: yes

    - name: Start MariaDB process manually
      # Using nohup ensures the process stays alive in the background
      shell: "nohup /usr/bin/mariadbd-safe --user=mysql > /dev/null 2>&1 &"
      async: 10
      poll: 0

    - name: Wait for MariaDB to become responsive
      command: mysqladmin ping
      register: db_ping
      retries: 10      # Increased retries to give it 50 seconds to boot
      delay: 5
      until: db_ping.rc == 0