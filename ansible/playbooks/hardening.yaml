# ansible/playbooks/hardening.yaml
# Applies basic hardening to all nodes except control-plane
#
# 'all,!control_plane' syntax excludes the control_plane group.
# control_plane was removed from inventory.ini entirely —
# this exclusion is kept here as a safety measure in case
# it is ever re-added in the future.
#
# NOTE: hostname task will fail silently on k3d Pods
# because /etc/hostname is read-only in Kubernetes containers.
# ignore_errors: yes ensures the playbook continues without stopping.
# The task applies successfully on Legacy-Node where the filesystem is writable.
- hosts: all,!control_plane
  tasks:

    - name: Set system hostname based on inventory name
      hostname:
        name: "{{ inventory_hostname }}"
      # /etc/hostname is read-only in k3d containers — skip without failing
      ignore_errors: yes

    - name: Disable and stop unnecessary services
      service:
        name: "{{ item }}"
        state: stopped
        enabled: no
      # These services are irrelevant in a telco container environment
      loop: ["avahi-daemon", "cups"]
      # Silently skip if the service does not exist on this OS
      ignore_errors: yes
