# ansible/playbooks/restart-app.yaml
#
# MANUAL ALTERNATIVE to the automatic restart in monitor.py
#
# monitor.py calls 'kubectl rollout restart' directly via subprocess
# for speed and simplicity. Use THIS playbook only when you want
# to trigger a manual restart via Ansible with full status output.
#
# To run manually:
#   ansible-playbook -i ansible/inventory.ini ansible/playbooks/restart-app.yaml
- hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Check Worker-App Pod status before restart
      command: kubectl get pods -l role=app
      register: pod_status

    - name: Display current Pod status
      debug:
        msg: "{{ pod_status.stdout_lines }}"

    - name: Trigger a rolling restart of the Worker-App Deployment
      # Kubernetes will terminate the old Pod and start a fresh one
      command: kubectl rollout restart deployment/worker-app

    - name: Confirm restart command was issued
      debug:
        msg: "Rollout restart triggered. Kubernetes will now replace old Pods with new ones."
